<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGH — Sistema de Gestión Hípica</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    /* LAYOUT */
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100;
    }
    .sidebar-logo {
      padding: 24px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .logo-text h2 { font-size: 18px; color: var(--accent); }
    .logo-text p { font-size: 11px; color: var(--muted); }
    .sidebar-section { padding: 12px 0; }
    .sidebar-section-title { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 20px 4px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px; padding: 10px 20px;
      color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500;
      border-left: 3px solid transparent; transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active { background: rgba(201,168,76,0.1); border-left-color: var(--accent); color: var(--accent); }
    .nav-icon { font-size: 16px; width: 20px; text-align: center; }

    .main { margin-left: 260px; flex: 1; }
    .topbar { background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 22px; color: var(--accent); }
    .club-badge { font-size: 12px; color: var(--muted); background: var(--card); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
    .content { padding: 32px; }

    /* HERO */
    .hero { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 32px; display: flex; align-items: center; gap: 24px; }
    .hero-icon { font-size: 48px; }
    .hero h2 { font-size: 28px; color: var(--accent); margin-bottom: 6px; }
    .hero p { color: var(--muted); font-size: 15px; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--accent); font-family: 'Playfair Display', serif; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* MODULE GRID */
    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .module-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px 20px;
      text-decoration: none; color: var(--text); transition: all 0.2s; display: flex; flex-direction: column; gap: 8px;
    }
    .module-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .module-card-icon { font-size: 28px; margin-bottom: 4px; }
    .module-card-title { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--accent); }
    .module-card-desc { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* TOAST */
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .topbar { padding: 16px; }
      .content { padding: 16px; }
      .hero { flex-direction: column; text-align: center; }
    }
    .menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
    @media (max-width: 768px) { .menu-toggle { display: block; } }
    /* AUTH */
    #auth-overlay { position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center; }
    .user-bar { display:flex;align-items:center;gap:10px; }
    .user-name { font-size:13px;color:var(--muted); }
    .btn-logout { background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s; }
    .btn-logout:hover { border-color:var(--danger);color:var(--danger); }
  </style>
</head>
<body>
<div id="auth-overlay"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>
<div id="toast-container"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🐎</div>
      <div class="logo-text"><h2>SGH</h2><p id="sidebar-club">Gestión Hípica</p></div>
    </div>

    <div id="sidebar-nav"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1>Sistema de Gestión Hípica</h1>
      </div>
      <div class="user-bar">
        <span class="club-badge" id="club-name">Cargando...</span>
        <span class="user-name" id="user-name"></span>
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <div class="content">
      <div class="hero">
        <div class="hero-icon">🏇</div>
        <div>
          <h2 id="hero-club">Bienvenido al SGH</h2>
          <p id="hero-desc">Sistema de Gestión Hípica — Panel de control</p>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-value" id="stat-spcs">—</div><div class="stat-label">SPCs activos</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-propietarios">—</div><div class="stat-label">Propietarios</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-profesionales">—</div><div class="stat-label">Profesionales</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-caballerizas">—</div><div class="stat-label">Caballerizas</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-reuniones">—</div><div class="stat-label">Reuniones</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-sanciones">—</div><div class="stat-label">Sanciones activas</div></div>
      </div>

      <div id="content-modules"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb, CLUB_ID, currentUser;
async function initAuth(){const{createClient}=supabase;sb=createClient('https://unlhcuanfrtpatoipwve.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubGhjdWFuZnJ0cGF0b2lwd3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjQ0OTcsImV4cCI6MjA5MjMwMDQ5N30.rKb8BI7fBQcRdyyyxVfBOZbtCmGYKIMLUDLVmkn1SYM');const{data:{session}}=await sb.auth.getSession();if(!session){window.location.replace('login.html');return false;}const{data:usr}=await sb.from('usuarios').select('club_id,nombre_completo,rol').eq('email',session.user.email).single();if(!usr?.club_id){await sb.auth.signOut();window.location.replace('login.html');return false;}CLUB_ID=usr.club_id;currentUser={...session.user,nombre_completo:usr.nombre_completo,rol:usr.rol};const uEl=document.getElementById('user-name');if(uEl)uEl.textContent=usr.nombre_completo||session.user.email;document.getElementById('auth-overlay').style.display='none';return true;}
function logout(){sb.auth.signOut().then(()=>window.location.replace('login.html'));}

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function loadDashboard() {
  try {
    const [club, spcs, props, profs, cabs, reuns, sancs] = await Promise.all([
      sb.from('clubs').select('nombre,sigla').eq('id', CLUB_ID).single(),
      sb.from('spcs').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID).eq('estado', 'activo'),
      sb.from('propietarios').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID).eq('activo', true),
      sb.from('profesionales').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID).eq('activo', true),
      sb.from('caballerizas').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID).eq('activo', true),
      sb.from('reuniones').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID),
      sb.from('sanciones').select('id', { count: 'exact', head: true }).eq('club_id', CLUB_ID).eq('estado', 'activa'),
    ]);

    if (club.data) {
      document.getElementById('club-name').textContent = club.data.sigla || club.data.nombre;
      document.getElementById('sidebar-club').textContent = club.data.sigla || club.data.nombre;
      document.getElementById('hero-club').textContent = club.data.nombre;
      document.getElementById('hero-desc').textContent = `Sistema de Gestión Hípica — ${club.data.sigla}`;
    }
    document.getElementById('stat-spcs').textContent = spcs.count ?? '—';
    document.getElementById('stat-propietarios').textContent = props.count ?? '—';
    document.getElementById('stat-profesionales').textContent = profs.count ?? '—';
    document.getElementById('stat-caballerizas').textContent = cabs.count ?? '—';
    document.getElementById('stat-reuniones').textContent = reuns.count ?? '—';
    document.getElementById('stat-sanciones').textContent = sancs.count ?? '—';
  } catch (e) {
    toast('Error al cargar datos del dashboard', 'error');
  }
}

function navSection(title, links) {
  const items = links.map(([href, icon, label]) =>
    `<a href="${href}" class="nav-link"><span class="nav-icon">${icon}</span>${label}</a>`
  ).join('');
  return `<div class="sidebar-section">
    <div class="sidebar-section-title">${title}</div>
    ${items}
  </div>`;
}

function moduleCard(href, icon, title, desc) {
  return `<a href="${href}" class="module-card">
    <div class="module-card-icon">${icon}</div>
    <div class="module-card-title">${title}</div>
    <div class="module-card-desc">${desc}</div>
  </a>`;
}

function moduleSection(title, cards) {
  return `<div class="section-title">${title}</div>
  <div class="module-grid">${cards.join('')}</div>`;
}

function buildUI(rol) {
  const sidenav = document.getElementById('sidebar-nav');
  const content = document.getElementById('content-modules');

  const dashSection = navSection('Dashboard', [['index.html', '🏠', 'Inicio']]);

  if (rol === 'super_admin') {
    sidenav.innerHTML =
      dashSection +
      navSection('Administración', [
        ['admin.html',         '🏛️', 'Clubs'],
        ['club.html',          '⚙️', 'Configuración'],
        ['hipodromos.html',    '🏟️', 'Hipódromos'],
        ['categorias.html',    '🏷️', 'Categorías'],
        ['Profesionales.html', '👤', 'Profesionales'],
        ['spcs.html',          '🐎', 'Stud Book'],
        ['propietarios.html',  '👔', 'Propietarios'],
        ['caballerizas.html',  '🏠', 'Caballerizas'],
        ['sanciones.html',     '⚖️', 'Sanciones'],
        ['reuniones.html',     '📅', 'Reuniones'],
        ['inscripciones.html', '📋', 'Inscripciones'],
        ['resultados.html',    '🏆', 'Resultados'],
        ['liquidaciones.html', '💰', 'Liquidaciones'],
      ]);

    content.innerHTML =
      moduleSection('Administración', [
        moduleCard('admin.html',         '🏛️', 'Clubs',          'Gestión global de clubs clientes'),
        moduleCard('club.html',          '⚙️', 'Configuración',  'Configuración del club actual'),
        moduleCard('hipodromos.html',    '🏟️', 'Hipódromos',     'Gestión de pistas y sedes de competencia'),
        moduleCard('categorias.html',    '🏷️', 'Categorías',     'Categorías de carrera y sus atributos'),
        moduleCard('Profesionales.html', '👤', 'Profesionales',  'Jockeys y entrenadores registrados'),
        moduleCard('spcs.html',          '🐎', 'Stud Book',      'Registro completo de ejemplares (SPCs)'),
        moduleCard('propietarios.html',  '👔', 'Propietarios',   'Alta, baja y modificación de propietarios'),
        moduleCard('caballerizas.html',  '🏠', 'Caballerizas',   'Studs, establecimientos y sus SPCs'),
        moduleCard('sanciones.html',     '⚖️', 'Sanciones',      'Registro y seguimiento de sanciones'),
        moduleCard('reuniones.html',     '📅', 'Reuniones',      'Programación y gestión de jornadas hípicas'),
        moduleCard('inscripciones.html', '📋', 'Inscripciones',  'Inscripción de ejemplares a carreras'),
        moduleCard('resultados.html',    '🏆', 'Resultados',     'Carga y consulta de resultados oficiales'),
        moduleCard('liquidaciones.html', '💰', 'Liquidaciones',  'Liquidación de premios y retenciones'),
      ]);

  } else {
    // secretario_carreras, operador y cualquier otro rol con club
    sidenav.innerHTML =
      dashSection +
      navSection('Operaciones', [
        ['reuniones.html',     '📅', 'Reuniones'],
        ['inscripciones.html', '📋', 'Inscripciones'],
        ['ratificacion.html',  '✅', 'Ratificación'],
        ['resultados.html',    '🏆', 'Resultados'],
        ['programa.html',      '🖨️', 'Programa'],
        ['liquidaciones.html', '💰', 'Liquidaciones'],
        ['Profesionales.html', '👤', 'Profesionales'],
        ['spcs.html',          '🐎', 'Stud Book'],
        ['propietarios.html',  '👔', 'Propietarios'],
        ['caballerizas.html',  '🏠', 'Caballerizas'],
        ['sanciones.html',     '⚖️', 'Sanciones'],
      ]);

    content.innerHTML =
      moduleSection('Operaciones', [
        moduleCard('reuniones.html',     '📅', 'Reuniones',      'Programación y gestión de jornadas hípicas'),
        moduleCard('inscripciones.html', '📋', 'Inscripciones',  'Inscripción de ejemplares a carreras'),
        moduleCard('ratificacion.html',  '✅', 'Ratificación',   'Ratificación de inscripciones'),
        moduleCard('resultados.html',    '🏆', 'Resultados',     'Carga y consulta de resultados oficiales'),
        moduleCard('programa.html',      '🖨️', 'Programa',       'Generación e impresión del programa oficial'),
        moduleCard('liquidaciones.html', '💰', 'Liquidaciones',  'Liquidación de premios y retenciones'),
        moduleCard('Profesionales.html', '👤', 'Profesionales',  'Jockeys y entrenadores registrados'),
        moduleCard('spcs.html',          '🐎', 'Stud Book',      'Registro completo de ejemplares (SPCs)'),
        moduleCard('propietarios.html',  '👔', 'Propietarios',   'Alta, baja y modificación de propietarios'),
        moduleCard('caballerizas.html',  '🏠', 'Caballerizas',   'Studs, establecimientos y sus SPCs'),
        moduleCard('sanciones.html',     '⚖️', 'Sanciones',      'Registro y seguimiento de sanciones'),
      ]);
  }
}

(async()=>{
  if(await initAuth()){
    buildUI(currentUser.rol);
    loadDashboard();
  }
})();
</script>
</body>
</html>
