<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="logo32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="logo180x180.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e2318">
  <title>Jockeys — SGH</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2); --input-bg: #0e2318;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .topbar { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .topbar h1 { font-size: 22px; color: var(--accent); flex: 1; }
    .content { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px 10px 40px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; outline: none; }
    .btn-primary { background: var(--accent); color: #1a1a0a; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.9; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 110px; }
    .stat-chip-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-chip-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: border-color 0.2s; }
    .card:hover { border-color: rgba(201,168,76,0.4); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .card-avatar { width: 44px; height: 44px; border-radius: 50%; background: rgba(201,168,76,0.15); border: 2px solid rgba(201,168,76,0.3); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--accent); margin-bottom: 3px; }
    .card-mat { font-size: 12px; color: var(--muted); }
    .badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-aprendiz { background: rgba(74,144,226,0.15); color: #74b0f7; border: 1px solid rgba(74,144,226,0.3); }
    .badge-clasico { background: rgba(201,168,76,0.1); color: var(--accent); border: 1px solid rgba(201,168,76,0.2); }
    .badge-senior { background: rgba(76,175,130,0.1); color: var(--success); border: 1px solid rgba(76,175,130,0.2); }
    .badge-amateur { background: rgba(180,180,180,0.1); color: var(--muted); border: 1px solid rgba(180,180,180,0.2); }
    .badge-inactivo { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .card-detail { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }
    .card-detail span { color: var(--text); }
    .peso-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .peso-box { flex: 1; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .peso-val { font-size: 17px; font-weight: 600; color: var(--text); }
    .peso-lbl { font-size: 10px; color: var(--muted); }
    .card-actions { display: flex; gap: 8px; }
    .btn-sm { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.2s; }
    .btn-edit { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .btn-edit:hover { background: rgba(201,168,76,0.25); }
    .btn-delete { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .btn-delete:hover { background: rgba(224,82,82,0.2); }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--muted); margin-bottom: 8px; }
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--card); z-index: 1; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 20px; color: var(--accent); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    .modal-body { padding: 20px 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    input, select, textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: #1a3d26; }
    .section-divider { grid-column: 1/-1; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 4px; }
    .modal-footer { padding: 16px 24px 24px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    #auth-overlay { position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center; }
    .btn-logout { background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;margin-left:auto; }
    .btn-logout:hover { border-color:var(--danger);color:var(--danger); }
    .user-name { font-size:13px;color:var(--muted); }
    .hipodromo-badge { display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--muted);margin-bottom:16px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: 1; } }
  </style>
</head>
<body>
<div id="auth-overlay"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>
<div id="toast-container"></div>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver</a>
  <h1>Jockeys</h1>
  <span class="user-name" id="user-name"></span>
  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="content">
  <div class="hipodromo-badge" id="hipodromo-badge">🏟️ Cargando hipódromo…</div>

  <div class="stats-row">
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-total">—</div><div class="stat-chip-lbl">Total</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-aprendiz">—</div><div class="stat-chip-lbl">Aprendices</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-clasico">—</div><div class="stat-chip-lbl">Clásicos</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-activos">—</div><div class="stat-chip-lbl">Activos</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar por nombre o matrícula…" oninput="filterRender()">
    </div>
    <select class="filter-select" id="filter-cat" onchange="filterRender()">
      <option value="">Todas las categorías</option>
      <option value="aprendiz">Aprendiz</option>
      <option value="clasico">Clásico</option>
      <option value="senior">Senior</option>
      <option value="amateur">Amateur</option>
    </select>
    <select class="filter-select" id="filter-activo" onchange="filterRender()">
      <option value="">Todos</option>
      <option value="true">Activos</option>
      <option value="false">Inactivos</option>
    </select>
    <button class="btn-primary" onclick="openModal()">+ Nuevo Jockey</button>
  </div>

  <div id="list-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nuevo Jockey</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="form" onsubmit="saveRecord(event)">
        <input type="hidden" id="f-id">
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" id="f-nombre" required placeholder="Nombre(s)">
          </div>
          <div class="form-group">
            <label>Apellido *</label>
            <input type="text" id="f-apellido" required placeholder="Apellido(s)">
          </div>
          <div class="form-group">
            <label>Tipo documento</label>
            <select id="f-doc-tipo">
              <option value="DNI">DNI</option>
              <option value="CUIT">CUIT</option>
              <option value="Pasaporte">Pasaporte</option>
            </select>
          </div>
          <div class="form-group">
            <label>N° documento</label>
            <input type="text" id="f-doc-nro">
          </div>
          <div class="form-group">
            <label>Fecha nacimiento</label>
            <input type="date" id="f-nacimiento">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="f-telefono">
          </div>
          <div class="form-group full">
            <label>Email</label>
            <input type="email" id="f-email">
          </div>
          <div class="form-group">
            <label>Activo</label>
            <select id="f-activo">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>

          <div class="section-divider">Licencia de Jockey</div>
          <div class="form-group">
            <label>N° Matrícula</label>
            <input type="text" id="f-matricula" placeholder="Mat-XXXXX">
          </div>
          <div class="form-group">
            <label>Categoría *</label>
            <select id="f-categoria" required>
              <option value="aprendiz">Aprendiz</option>
              <option value="clasico">Clásico</option>
              <option value="senior">Senior</option>
              <option value="amateur">Amateur</option>
            </select>
          </div>
          <div class="form-group">
            <label>Peso mínimo (kg)</label>
            <input type="number" id="f-peso-min" min="40" max="80" step="0.1" placeholder="Ej: 54">
          </div>
          <div class="form-group">
            <label>Peso máximo (kg)</label>
            <input type="number" id="f-peso-max" min="40" max="80" step="0.1" placeholder="Ej: 62">
          </div>

          <div class="form-group full">
            <label>Notas</label>
            <textarea id="f-notas" placeholder="Observaciones…"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="document.getElementById('form').requestSubmit()" id="btn-save">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb, CLUB_ID, currentUser;
async function initAuth(){const{createClient}=supabase;sb=createClient('https://unlhcuanfrtpatoipwve.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubGhjdWFuZnJ0cGF0b2lwd3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjQ0OTcsImV4cCI6MjA5MjMwMDQ5N30.rKb8BI7fBQcRdyyyxVfBOZbtCmGYKIMLUDLVmkn1SYM');const{data:{session}}=await sb.auth.getSession();if(!session){window.location.replace('login.html');return false;}const{data:usr}=await sb.from('usuarios').select('club_id,nombre_completo,rol').eq('email',session.user.email).single();if(usr.rol==='super_admin'){const urlClub=new URLSearchParams(window.location.search).get('club');CLUB_ID=urlClub||usr.club_id||null;}else{if(!usr.club_id){await sb.auth.signOut();window.location.replace('login.html');return false;}CLUB_ID=usr.club_id;}currentUser={...session.user,nombre_completo:usr.nombre_completo,rol:usr.rol};const uEl=document.getElementById('user-name');if(uEl)uEl.textContent=usr.nombre_completo||session.user.email;document.getElementById('auth-overlay').style.display='none';return true;}
function logout(){sb.auth.signOut().then(()=>window.location.replace('login.html'));}

let allData = [];

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`; t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function load() {
  document.getElementById('list-container').innerHTML = '<div class="loading-state"><div class="spinner"></div> Cargando jockeys…</div>';
  const [{ data, error }, { data: club }] = await Promise.all([
    sb.from('profesionales').select('*').eq('club_id', CLUB_ID).eq('tipo', 'jockey').order('apellido').order('nombre'),
    sb.from('clubs').select('nombre,sigla').eq('id', CLUB_ID).single(),
  ]);
  if (error) { toast(error.message, 'error'); document.getElementById('list-container').innerHTML = ''; return; }
  allData = data || [];
  if (club) {
    document.getElementById('hipodromo-badge').textContent = `🏟️ ${club.sigla || club.nombre}`;
  }
  updateStats();
  filterRender();
}

function updateStats() {
  document.getElementById('cnt-total').textContent = allData.length;
  document.getElementById('cnt-aprendiz').textContent = allData.filter(r => r.categoria_jockey === 'aprendiz').length;
  document.getElementById('cnt-clasico').textContent = allData.filter(r => r.categoria_jockey === 'clasico').length;
  document.getElementById('cnt-activos').textContent = allData.filter(r => r.activo).length;
}

function filterRender() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const activo = document.getElementById('filter-activo').value;
  const data = allData.filter(r => {
    const fullName = `${r.apellido} ${r.nombre}`.toLowerCase();
    const matchQ = !q || fullName.includes(q) || r.matricula_nro?.toLowerCase().includes(q);
    const matchCat = !cat || r.categoria_jockey === cat;
    const matchActivo = activo === '' || String(r.activo) === activo;
    return matchQ && matchCat && matchActivo;
  });
  renderList(data);
}

const catBadge = { aprendiz: 'badge-aprendiz', clasico: 'badge-clasico', senior: 'badge-senior', amateur: 'badge-amateur' };

function renderList(data) {
  if (!data.length) {
    document.getElementById('list-container').innerHTML = `<div class="empty-state"><div class="icon">🎽</div><h3>Sin resultados</h3><p>No se encontraron jockeys con los filtros aplicados.</p></div>`;
    return;
  }
  document.getElementById('list-container').innerHTML = `<div class="grid">${data.map(r => cardHTML(r)).join('')}</div>`;
}

function cardHTML(r) {
  const nombre = `${r.apellido}, ${r.nombre}`;
  return `<div class="card">
    <div class="card-header">
      <div class="card-avatar">🎽</div>
      <div class="card-info">
        <div class="card-name">${nombre}</div>
        ${r.matricula_nro ? `<div class="card-mat">Mat. ${r.matricula_nro}</div>` : ''}
      </div>
      <div class="badges">
        ${r.categoria_jockey ? `<span class="badge ${catBadge[r.categoria_jockey]||''}">${r.categoria_jockey}</span>` : ''}
        ${!r.activo ? `<span class="badge badge-inactivo">Inactivo</span>` : ''}
      </div>
    </div>
    ${(r.peso_minimo || r.peso_maximo) ? `<div class="peso-row">
      ${r.peso_minimo ? `<div class="peso-box"><div class="peso-val">${r.peso_minimo} kg</div><div class="peso-lbl">Peso mín.</div></div>` : ''}
      ${r.peso_maximo ? `<div class="peso-box"><div class="peso-val">${r.peso_maximo} kg</div><div class="peso-lbl">Peso máx.</div></div>` : ''}
    </div>` : ''}
    <div class="card-detail">
      ${r.documento_nro ? `<div>🪪 <span>${r.documento_tipo||''} ${r.documento_nro}</span></div>` : ''}
      ${r.fecha_nacimiento ? `<div>🎂 <span>${new Date(r.fecha_nacimiento).toLocaleDateString('es-AR')}</span></div>` : ''}
      ${r.telefono ? `<div>📞 <span>${r.telefono}</span></div>` : ''}
    </div>
    <div class="card-actions">
      <button class="btn-sm btn-edit" onclick='openModal(${JSON.stringify(r)})'>✏️ Editar</button>
      <button class="btn-sm btn-delete" onclick="deleteRecord('${r.id}','${r.apellido} ${r.nombre}')">🗑️ Eliminar</button>
    </div>
  </div>`;
}

function openModal(rec = null) {
  document.getElementById('modal-title').textContent = rec ? 'Editar Jockey' : 'Nuevo Jockey';
  document.getElementById('f-id').value = rec?.id || '';
  document.getElementById('f-nombre').value = rec?.nombre || '';
  document.getElementById('f-apellido').value = rec?.apellido || '';
  document.getElementById('f-doc-tipo').value = rec?.documento_tipo || 'DNI';
  document.getElementById('f-doc-nro').value = rec?.documento_nro || '';
  document.getElementById('f-nacimiento').value = rec?.fecha_nacimiento || '';
  document.getElementById('f-telefono').value = rec?.telefono || '';
  document.getElementById('f-email').value = rec?.email || '';
  document.getElementById('f-activo').value = rec ? String(rec.activo) : 'true';
  document.getElementById('f-matricula').value = rec?.matricula_nro || '';
  document.getElementById('f-categoria').value = rec?.categoria_jockey || 'aprendiz';
  document.getElementById('f-peso-min').value = rec?.peso_minimo || '';
  document.getElementById('f-peso-max').value = rec?.peso_maximo || '';
  document.getElementById('f-notas').value = rec?.notas || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('form').reset();
}

async function saveRecord(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const id = document.getElementById('f-id').value;
  const payload = {
    club_id: CLUB_ID,
    tipo: 'jockey',
    nombre: document.getElementById('f-nombre').value.trim(),
    apellido: document.getElementById('f-apellido').value.trim(),
    documento_tipo: document.getElementById('f-doc-tipo').value,
    documento_nro: document.getElementById('f-doc-nro').value.trim() || null,
    fecha_nacimiento: document.getElementById('f-nacimiento').value || null,
    telefono: document.getElementById('f-telefono').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    activo: document.getElementById('f-activo').value === 'true',
    matricula_nro: document.getElementById('f-matricula').value.trim() || null,
    categoria_jockey: document.getElementById('f-categoria').value,
    peso_minimo: document.getElementById('f-peso-min').value ? parseFloat(document.getElementById('f-peso-min').value) : null,
    peso_maximo: document.getElementById('f-peso-max').value ? parseFloat(document.getElementById('f-peso-max').value) : null,
    notas: document.getElementById('f-notas').value.trim() || null,
  };
  const { error } = id
    ? await sb.from('profesionales').update(payload).eq('id', id)
    : await sb.from('profesionales').insert(payload);
  btn.disabled = false; btn.textContent = 'Guardar';
  if (error) { toast(error.message, 'error'); return; }
  toast(id ? 'Jockey actualizado' : 'Jockey creado');
  closeModal();
  load();
}

async function deleteRecord(id, nombre) {
  if (!confirm(`¿Eliminar a "${nombre}"?`)) return;
  const { error } = await sb.from('profesionales').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast('Jockey eliminado');
  load();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
(async()=>{if(await initAuth())load();})();
</script>
</body>
