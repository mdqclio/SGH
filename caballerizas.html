<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caballerizas — SGH</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2); --input-bg: #0e2318;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .topbar { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .topbar h1 { font-size: 22px; color: var(--accent); flex: 1; }
    .content { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 240px; position: relative; }
    .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px 10px 40px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; outline: none; }
    .btn-primary { background: var(--accent); color: #1a1a0a; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.9; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 120px; }
    .stat-chip-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-chip-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: border-color 0.2s; }
    .card:hover { border-color: rgba(201,168,76,0.4); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); margin-bottom: 3px; }
    .card-responsable { font-size: 13px; color: var(--muted); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-activo { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .badge-inactivo { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .spc-count { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 10px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
    .spc-count-num { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'Playfair Display', serif; }
    .spc-count-label { font-size: 12px; color: var(--muted); }
    .spc-link { font-size: 12px; color: var(--accent); text-decoration: none; }
    .spc-link:hover { text-decoration: underline; }
    .card-detail { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 14px; }
    .card-detail span { color: var(--text); }
    .card-actions { display: flex; gap: 8px; }
    .btn-sm { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.2s; }
    .btn-edit { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .btn-edit:hover { background: rgba(201,168,76,0.25); }
    .btn-delete { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .btn-delete:hover { background: rgba(224,82,82,0.2); }
    .btn-spcs { background: rgba(74,144,226,0.1); color: #74b0f7; border: 1px solid rgba(74,144,226,0.3); }
    .btn-spcs:hover { background: rgba(74,144,226,0.2); }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--muted); margin-bottom: 8px; }
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 20px; color: var(--accent); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px; }
    .modal-body { padding: 20px 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    input, select, textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #1a3d26; }
    .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: 1; } }
    #auth-overlay { position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center; }
    .btn-logout { background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;margin-left:auto; }
    .btn-logout:hover { border-color:var(--danger);color:var(--danger); }
    .user-name { font-size:13px;color:var(--muted); }
  </style>
</head>
<body>
<div id="auth-overlay"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>
<div id="toast-container"></div>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver</a>
  <h1>Caballerizas</h1>
  <span class="user-name" id="user-name"></span>
  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="content">
  <div class="stats-row">
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-total">—</div><div class="stat-chip-lbl">Total</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-activas">—</div><div class="stat-chip-lbl">Activas</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-spcs">—</div><div class="stat-chip-lbl">SPCs alojados</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar por nombre o responsable…" oninput="filterRender()">
    </div>
    <select class="filter-select" id="filter-activo" onchange="filterRender()">
      <option value="">Todas</option>
      <option value="true">Activas</option>
      <option value="false">Inactivas</option>
    </select>
    <button class="btn-primary" onclick="openModal()">+ Nueva Caballeriza</button>
  </div>

  <div id="list-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nueva Caballeriza</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="form" onsubmit="saveRecord(event)">
        <input type="hidden" id="f-id">
        <div class="form-grid">
          <div class="form-group full">
            <label>Nombre *</label>
            <input type="text" id="f-nombre" required placeholder="Nombre del stud o caballeriza">
          </div>
          <div class="form-group">
            <label>Responsable</label>
            <input type="text" id="f-responsable" placeholder="Nombre del responsable">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="f-telefono">
          </div>
          <div class="form-group full">
            <label>Domicilio</label>
            <input type="text" id="f-domicilio" placeholder="Dirección de la caballeriza">
          </div>
          <div class="form-group">
            <label>Activo</label>
            <select id="f-activo">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Notas</label>
            <textarea id="f-notas" placeholder="Observaciones…"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="document.getElementById('form').requestSubmit()" id="btn-save">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb, CLUB_ID, currentUser;
async function initAuth(){const{createClient}=supabase;sb=createClient('https://unlhcuanfrtpatoipwve.supabase.co','sb_publishable_gypetSX16kGMXHhG_xqLWA_7wrzWgAK');const{data:{session}}=await sb.auth.getSession();if(!session){window.location.replace('login.html');return false;}const{data:usr}=await sb.from('usuarios').select('club_id,nombre,rol').eq('email',session.user.email).single();if(!usr?.club_id){await sb.auth.signOut();window.location.replace('login.html');return false;}CLUB_ID=usr.club_id;currentUser={...session.user,nombre:usr.nombre,rol:usr.rol};const uEl=document.getElementById('user-name');if(uEl)uEl.textContent=usr.nombre||session.user.email;document.getElementById('auth-overlay').style.display='none';return true;}
function logout(){sb.auth.signOut().then(()=>window.location.replace('login.html'));}

let allData = [];
let spcCounts = {};

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function load() {
  document.getElementById('list-container').innerHTML = '<div class="loading-state"><div class="spinner"></div> Cargando caballerizas…</div>';
  const [{ data: cabs, error }, { data: spcs }] = await Promise.all([
    sb.from('caballerizas').select('*').eq('club_id', CLUB_ID).order('nombre'),
    sb.from('spcs').select('caballeriza_id').eq('club_id', CLUB_ID).eq('estado', 'activo'),
  ]);
  if (error) { toast(error.message, 'error'); document.getElementById('list-container').innerHTML = ''; return; }
  allData = cabs || [];
  spcCounts = {};
  (spcs || []).forEach(s => {
    if (s.caballeriza_id) spcCounts[s.caballeriza_id] = (spcCounts[s.caballeriza_id] || 0) + 1;
  });
  updateStats(spcs?.length || 0);
  filterRender();
}

function updateStats(totalSpcs) {
  document.getElementById('cnt-total').textContent = allData.length;
  document.getElementById('cnt-activas').textContent = allData.filter(r => r.activo).length;
  document.getElementById('cnt-spcs').textContent = totalSpcs;
}

function filterRender() {
  const q = document.getElementById('search').value.toLowerCase();
  const activo = document.getElementById('filter-activo').value;
  let data = allData.filter(r => {
    const matchQ = !q || r.nombre?.toLowerCase().includes(q) || r.responsable?.toLowerCase().includes(q);
    const matchActivo = activo === '' || String(r.activo) === activo;
    return matchQ && matchActivo;
  });
  renderList(data);
}

function renderList(data) {
  if (!data.length) {
    document.getElementById('list-container').innerHTML = `<div class="empty-state"><div class="icon">🏠</div><h3>Sin resultados</h3><p>No se encontraron caballerizas con los filtros aplicados.</p></div>`;
    return;
  }
  document.getElementById('list-container').innerHTML = `<div class="grid">${data.map(r => cardHTML(r)).join('')}</div>`;
}

function cardHTML(r) {
  const cnt = spcCounts[r.id] || 0;
  const badge = r.activo
    ? `<span class="badge badge-activo">Activa</span>`
    : `<span class="badge badge-inactivo">Inactiva</span>`;
  return `<div class="card">
    <div class="card-header">
      <div>
        <div class="card-name">${r.nombre}</div>
        ${r.responsable ? `<div class="card-responsable">Responsable: ${r.responsable}</div>` : ''}
      </div>
      ${badge}
    </div>
    <div class="spc-count">
      <div>
        <div class="spc-count-num">${cnt}</div>
        <div class="spc-count-label">SPCs activos</div>
      </div>
      ${cnt > 0 ? `<a href="spcs.html?caballeriza=${r.id}" class="spc-link">Ver SPCs →</a>` : ''}
    </div>
    <div class="card-detail">
      ${r.domicilio ? `<div>📍 <span>${r.domicilio}</span></div>` : ''}
      ${r.telefono ? `<div>📞 <span>${r.telefono}</span></div>` : ''}
      ${r.notas ? `<div>📝 <span>${r.notas}</span></div>` : ''}
    </div>
    <div class="card-actions">
      <button class="btn-sm btn-edit" onclick='openModal(${JSON.stringify(r)})'>✏️ Editar</button>
      <button class="btn-sm btn-delete" onclick="deleteRecord('${r.id}','${r.nombre.replace(/'/g,"\\'")}')">🗑️ Eliminar</button>
    </div>
  </div>`;
}

function openModal(rec = null) {
  document.getElementById('modal-title').textContent = rec ? 'Editar Caballeriza' : 'Nueva Caballeriza';
  document.getElementById('f-id').value = rec?.id || '';
  document.getElementById('f-nombre').value = rec?.nombre || '';
  document.getElementById('f-responsable').value = rec?.responsable || '';
  document.getElementById('f-telefono').value = rec?.telefono || '';
  document.getElementById('f-domicilio').value = rec?.domicilio || '';
  document.getElementById('f-activo').value = rec ? String(rec.activo) : 'true';
  document.getElementById('f-notas').value = rec?.notas || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('form').reset();
}

async function saveRecord(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const id = document.getElementById('f-id').value;
  const payload = {
    club_id: CLUB_ID,
    nombre: document.getElementById('f-nombre').value.trim(),
    responsable: document.getElementById('f-responsable').value.trim() || null,
    telefono: document.getElementById('f-telefono').value.trim() || null,
    domicilio: document.getElementById('f-domicilio').value.trim() || null,
    activo: document.getElementById('f-activo').value === 'true',
    notas: document.getElementById('f-notas').value.trim() || null,
  };
  const { error } = id
    ? await sb.from('caballerizas').update(payload).eq('id', id)
    : await sb.from('caballerizas').insert(payload);
  btn.disabled = false; btn.textContent = 'Guardar';
  if (error) { toast(error.message, 'error'); return; }
  toast(id ? 'Caballeriza actualizada' : 'Caballeriza creada');
  closeModal();
  load();
}

async function deleteRecord(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"? Los SPCs asociados perderán la referencia.`)) return;
  const { error } = await sb.from('caballerizas').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast('Caballeriza eliminada');
  load();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
(async()=>{if(await initAuth())load();})();
</script>
</body>
</html>
