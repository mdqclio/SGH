<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuarios — SGH</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2); --input-bg: #0e2318;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .topbar { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; white-space: nowrap; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .topbar h1 { font-size: 20px; color: var(--accent); flex: 1; }
    .topbar-club { font-size: 12px; color: var(--muted); background: var(--card); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap; }
    .user-name { font-size: 13px; color: var(--muted); }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; transition: all 0.2s; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .content { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .toolbar-title { font-family: 'Playfair Display', serif; font-size: 18px; flex: 1; }
    .btn-primary { background: var(--accent); color: #1a1a0a; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    /* TABLE */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead th { background: rgba(0,0,0,0.25); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:hover { background: rgba(201,168,76,0.04); }
    tbody td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }
    .cell-name { font-weight: 500; color: var(--text); }
    .cell-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-activo   { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .badge-inactivo { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .badge-rol { background: rgba(201,168,76,0.08); color: var(--accent); border: 1px solid rgba(201,168,76,0.2); font-size: 10px; }
    .actions-cell { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.2s; white-space: nowrap; }
    .btn-edit       { background: rgba(116,176,247,0.1); color: #74b0f7; border: 1px solid rgba(116,176,247,0.3); }
    .btn-edit:hover { background: rgba(116,176,247,0.2); }
    .btn-toggle-on  { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .btn-toggle-on:hover  { background: rgba(224,82,82,0.2); }
    .btn-toggle-off { background: rgba(76,175,130,0.1); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .btn-toggle-off:hover { background: rgba(76,175,130,0.2); }
    /* STATES */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--muted); }
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; margin: auto; }
    .modal-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 1; }
    .modal-header h2 { font-size: 20px; color: var(--accent); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 9px 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; width: 100%; transition: border 0.2s; }
    input:focus, select:focus { border-color: var(--accent); }
    input:disabled { opacity: 0.5; cursor: not-allowed; }
    select option { background: #1a3d26; }
    .hint { font-size: 11px; color: var(--muted); }
    .modal-error { color: var(--danger); font-size: 13px; display: none; }
    .modal-error.show { display: block; }
    .modal-footer { padding: 16px 24px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--card); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
    /* TOAST */
    #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error   { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="auth-overlay"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>
<div id="toast-container"></div>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver</a>
  <h1>👥 Usuarios</h1>
  <span class="topbar-club" id="club-name">Cargando…</span>
  <span class="user-name" id="user-name"></span>
  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="content">
  <div class="toolbar">
    <div class="toolbar-title">Usuarios del hipódromo</div>
    <button class="btn-primary" onclick="openCreate()">+ Nuevo Usuario</button>
  </div>
  <div id="list-container">
    <div class="loading-state"><div class="spinner"></div> Cargando usuarios…</div>
  </div>
</div>

<!-- MODAL CREAR -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-header">
      <h2>Nuevo Usuario</h2>
      <button class="btn-close" onclick="closeCreate()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="c-nombre" placeholder="Nombre y apellido">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="c-email" placeholder="usuario@ejemplo.com">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="c-telefono" placeholder="Ej: 221 15-000-0000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Contraseña inicial *</label>
          <input type="password" id="c-pass" placeholder="Mínimo 6 caracteres" minlength="6">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña *</label>
          <input type="password" id="c-pass2" placeholder="Repetir">
        </div>
      </div>
      <div class="form-group">
        <label>Rol *</label>
        <select id="c-rol">
          <option value="secretario_carreras">Secretario de carreras</option>
          <option value="operador">Operador</option>
        </select>
      </div>
      <div class="modal-error" id="c-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeCreate()">Cancelar</button>
      <button class="btn-primary" id="btn-create" onclick="saveCreate()">Crear Usuario</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <h2>Editar Usuario</h2>
      <button class="btn-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="e-id">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input type="text" id="e-nombre">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="e-email" disabled>
          <span class="hint">El email no puede modificarse.</span>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="e-telefono">
        </div>
      </div>
      <div class="form-group">
        <label>Rol *</label>
        <select id="e-rol">
          <option value="secretario_carreras">Secretario de carreras</option>
          <option value="operador">Operador</option>
          <option value="super_admin">Super Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeEdit()">Cancelar</button>
      <button class="btn-primary" id="btn-edit-save" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://unlhcuanfrtpatoipwve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubGhjdWFuZnJ0cGF0b2lwd3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjQ0OTcsImV4cCI6MjA5MjMwMDQ5N30.rKb8BI7fBQcRdyyyxVfBOZbtCmGYKIMLUDLVmkn1SYM';

let sb, CLUB_ID, currentUser;
async function initAuth(){const{createClient}=supabase;sb=createClient(SUPABASE_URL,SUPABASE_KEY);const{data:{session}}=await sb.auth.getSession();if(!session){window.location.replace('login.html');return false;}const{data:usr}=await sb.from('usuarios').select('club_id,nombre_completo,rol').eq('email',session.user.email).single();if(!usr){await sb.auth.signOut();window.location.replace('login.html');return false;}if(usr.rol==='super_admin'){const urlClub=new URLSearchParams(window.location.search).get('club');CLUB_ID=urlClub||usr.club_id||null;}else{if(!usr.club_id){await sb.auth.signOut();window.location.replace('login.html');return false;}CLUB_ID=usr.club_id;}currentUser={...session.user,nombre_completo:usr.nombre_completo,rol:usr.rol};const uEl=document.getElementById('user-name');if(uEl)uEl.textContent=usr.nombre_completo||session.user.email;document.getElementById('auth-overlay').style.display='none';return true;}
function logout(){sb.auth.signOut().then(()=>window.location.replace('login.html'));}

function toast(msg,type='success'){const t=document.createElement('div');t.className=`toast toast-${type}`;t.textContent=msg;document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),4000);}

const ROL_LABELS = {
  super_admin: 'Super Admin',
  secretario_carreras: 'Secretario de carreras',
  operador: 'Operador',
  profesional: 'Profesional',
  propietario: 'Propietario',
  publico: 'Público',
};

let allData = [];

async function load() {
  document.getElementById('list-container').innerHTML = '<div class="loading-state"><div class="spinner"></div> Cargando usuarios…</div>';

  // Cargar nombre del hipódromo
  if (CLUB_ID) {
    const { data: club } = await sb.from('clubs').select('nombre,sigla').eq('id', CLUB_ID).single();
    if (club) document.getElementById('club-name').textContent = club.sigla || club.nombre;
  } else {
    document.getElementById('club-name').textContent = 'Todos los hipódromos';
  }

  let query = sb.from('usuarios').select('*').order('nombre_completo');
  if (CLUB_ID) query = query.eq('club_id', CLUB_ID);

  const { data, error } = await query;
  if (error) { toast(error.message, 'error'); return; }
  allData = data || [];
  renderTable();
}

function renderTable() {
  if (!allData.length) {
    document.getElementById('list-container').innerHTML = '<div class="empty-state"><div class="icon">👥</div><h3>Sin usuarios registrados</h3></div>';
    return;
  }
  const rows = allData.map(u => {
    const activo = u.activo !== false;
    const toggleBtn = activo
      ? `<button class="btn-sm btn-toggle-on" onclick="toggleActivo('${u.id}',false)">Desactivar</button>`
      : `<button class="btn-sm btn-toggle-off" onclick="toggleActivo('${u.id}',true)">Activar</button>`;
    return `<tr>
      <td>
        <div class="cell-name">${u.nombre_completo || '—'}</div>
        ${u.telefono ? `<div class="cell-sub">📞 ${u.telefono}</div>` : ''}
      </td>
      <td><div class="cell-sub">${u.email}</div></td>
      <td><span class="badge badge-rol">${ROL_LABELS[u.rol] || u.rol}</span></td>
      <td><span class="badge badge-${activo ? 'activo' : 'inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span></td>
      <td>
        <div class="actions-cell">
          <button class="btn-sm btn-edit" onclick='openEdit(${JSON.stringify(u)})'>✏️ Editar</button>
          ${toggleBtn}
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('list-container').innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Nombre</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ---- CREAR ---- */
function openCreate() {
  ['c-nombre','c-email','c-telefono','c-pass','c-pass2'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-rol').value = 'secretario_carreras';
  setCreateError('');
  document.getElementById('modal-create').classList.add('open');
}
function closeCreate() { document.getElementById('modal-create').classList.remove('open'); }
function setCreateError(msg) {
  const el = document.getElementById('c-error');
  el.textContent = msg;
  el.className = 'modal-error' + (msg ? ' show' : '');
}

async function saveCreate() {
  const nombre   = document.getElementById('c-nombre').value.trim();
  const email    = document.getElementById('c-email').value.trim();
  const telefono = document.getElementById('c-telefono').value.trim();
  const pass     = document.getElementById('c-pass').value;
  const pass2    = document.getElementById('c-pass2').value;
  const rol      = document.getElementById('c-rol').value;

  if (!nombre)          { setCreateError('El nombre es requerido.'); return; }
  if (!email)           { setCreateError('El email es requerido.'); return; }
  if (!pass || pass.length < 6) { setCreateError('La contraseña debe tener al menos 6 caracteres.'); return; }
  if (pass !== pass2)   { setCreateError('Las contraseñas no coinciden.'); return; }
  if (!CLUB_ID) { setCreateError('No hay hipódromo seleccionado. Usá ?club=UUID en la URL.'); return; }

  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = 'Creando…';

  try {
    const { data: authData, error: authErr } = await sb.auth.signUp({
      email, password: pass,
      options: { data: { nombre_completo: nombre } }
    });
    if (authErr) throw new Error('Error auth: ' + authErr.message);
    if (!authData.user) throw new Error('No se pudo crear el usuario.');

    const { error: usrErr } = await sb.from('usuarios').insert({
      email, nombre_completo: nombre,
      telefono: telefono || null,
      club_id: CLUB_ID, rol, activo: true,
    });
    if (usrErr) throw new Error('Error al guardar usuario: ' + usrErr.message);

    toast('Usuario creado correctamente');
    closeCreate();
    load();
  } catch (err) {
    setCreateError(err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Crear Usuario';
  }
}

/* ---- EDITAR ---- */
function openEdit(u) {
  document.getElementById('e-id').value      = u.id;
  document.getElementById('e-nombre').value  = u.nombre_completo || '';
  document.getElementById('e-email').value   = u.email || '';
  document.getElementById('e-telefono').value= u.telefono || '';
  document.getElementById('e-rol').value     = u.rol || 'operador';
  document.getElementById('modal-edit').classList.add('open');
}
function closeEdit() { document.getElementById('modal-edit').classList.remove('open'); }

async function saveEdit() {
  const id     = document.getElementById('e-id').value;
  const nombre = document.getElementById('e-nombre').value.trim();
  if (!nombre) { toast('El nombre es requerido', 'error'); return; }
  const btn = document.getElementById('btn-edit-save');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const { error } = await sb.from('usuarios').update({
    nombre_completo: nombre,
    telefono: document.getElementById('e-telefono').value.trim() || null,
    rol:      document.getElementById('e-rol').value,
  }).eq('id', id);
  btn.disabled = false; btn.textContent = 'Guardar cambios';
  if (error) { toast(error.message, 'error'); return; }
  toast('Usuario actualizado');
  closeEdit();
  load();
}

/* ---- TOGGLE ---- */
async function toggleActivo(id, activo) {
  const u = allData.find(x => x.id === id);
  if (!confirm(`¿Deseas ${activo ? 'activar' : 'desactivar'} al usuario "${u?.nombre_completo}"?`)) return;
  const { error } = await sb.from('usuarios').update({ activo }).eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast(`Usuario ${activo ? 'activado' : 'desactivado'}`);
  load();
}

document.getElementById('modal-create').addEventListener('click', e => { if (e.target === e.currentTarget) closeCreate(); });
document.getElementById('modal-edit').addEventListener('click',   e => { if (e.target === e.currentTarget) closeEdit(); });
(async () => { if (await initAuth()) load(); })();
</script>
</body>
</html>
