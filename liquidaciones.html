<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="logo 32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="logo 180x180.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e2318">
  <title>Liquidaciones — SGH</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2); --input-bg: #0e2318;
      --info: #74b0f7;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .topbar { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .topbar h1 { font-size: 18px; color: var(--accent); flex: 1; }
    .btn-primary { background: var(--accent); color: #1a1a0a; border: none; padding: 9px 18px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 9px 18px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    /* TABS */
    .tabs { background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); display: flex; }
    .tab { padding: 13px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    /* SELECTOR BAR */
    .selector-bar { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .selector-bar label { font-size: 12px; color: var(--muted); }
    select, input, textarea { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    select option { background: #1a3d26; }
    .content { max-width: 1100px; margin: 0 auto; padding: 24px; }
    /* LIQUIDACIONES LIST */
    .liq-grid { display: flex; flex-direction: column; gap: 14px; }
    .liq-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .liq-card.borrador { border-left: 4px solid var(--muted); }
    .liq-card.aprobada { border-left: 4px solid var(--accent); }
    .liq-card.pagada { border-left: 4px solid var(--success); }
    .liq-card.anulada { border-left: 4px solid var(--danger); }
    .liq-header { padding: 14px 18px; display: flex; gap: 14px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .liq-prof { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--accent); }
    .liq-recibo { font-size: 12px; color: var(--muted); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .badge-borrador { background: rgba(160,184,160,0.1); color: var(--muted); border: 1px solid rgba(160,184,160,0.3); }
    .badge-aprobada { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .badge-pagada { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .badge-anulada { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .liq-montos { display: flex; gap: 16px; flex-wrap: wrap; font-size: 13px; }
    .monto-item { text-align: center; }
    .monto-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .monto-val { font-size: 16px; font-weight: 700; color: var(--text); }
    .monto-val.neto { color: var(--accent); }
    .liq-acciones { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-sm { padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; white-space: nowrap; }
    .btn-det { background: rgba(116,176,247,0.1); color: var(--info); border: 1px solid rgba(116,176,247,0.3); }
    .btn-aprobar { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .btn-pagar { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .btn-impr { background: rgba(180,180,180,0.1); color: var(--muted); border: 1px solid rgba(180,180,180,0.3); }
    .btn-delete { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    /* DETALLE */
    .detalle-table { width: 100%; border-collapse: collapse; }
    .detalle-table thead th { background: rgba(0,0,0,0.15); padding: 8px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    .detalle-table tbody tr { border-top: 1px solid var(--border); }
    .detalle-table tbody td { padding: 9px 14px; font-size: 13px; }
    .detalle-table tfoot td { padding: 10px 14px; font-size: 13px; font-weight: 600; border-top: 2px solid var(--border); }
    .text-right { text-align: right; }
    .text-accent { color: var(--accent); }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    /* COMISIONES TAB */
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .config-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .config-card-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
    .config-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); padding: 3px 0; }
    .config-row span { color: var(--text); }
    /* LOADING / EMPTY */
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 50px; gap: 12px; color: var(--muted); }
    .spinner { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 50px 20px; }
    .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 16px; color: var(--muted); }
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: none; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 700px; margin: auto; }
    .modal-header { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .modal-header h2 { font-size: 18px; color: var(--accent); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    .modal-body { padding: 20px 22px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1/-1; }
    label { font-size: 12px; font-weight: 500; color: var(--muted); }
    input, select, textarea { width: 100%; }
    textarea { min-height: 60px; resize: vertical; }
    .modal-footer { padding: 14px 22px; display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid var(--border); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 9px 18px; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; }
    /* RECIBO PRINT */
    .recibo-print { display: none; }
    @media print {
      body { background: #fff !important; color: #000 !important; font-family: Arial, sans-serif; }
      .topbar, .tabs, .selector-bar, .liq-acciones, #toast-container { display: none !important; }
      .recibo-print { display: block; }
      .content { display: none; }
      .recibo-container { max-width: 700px; margin: 0 auto; padding: 20px; }
      .recibo-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 16px; }
      .recibo-header h2 { font-size: 20px; }
      .recibo-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      .recibo-table th, .recibo-table td { border: 1px solid #ccc; padding: 7px 10px; font-size: 12px; }
      .recibo-table th { background: #f0f0f0; }
      .recibo-total { font-weight: 700; font-size: 14px; text-align: right; margin-top: 12px; }
      @page { size: A4; margin: 15mm; }
    }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: 1; } }
    #auth-overlay { position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center; }
    .btn-logout { background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all 0.2s;margin-left:auto; }
    .btn-logout:hover { border-color:var(--danger);color:var(--danger); }
    .user-name { font-size:13px;color:var(--muted); }
    @media print { #auth-overlay, .btn-logout, .user-name { display:none !important; } }
  </style>
</head>
<body>
<div id="auth-overlay"><div class="spinner" style="width:32px;height:32px;border-width:3px;"></div></div>
<div id="toast-container"></div>

<!-- RECIBO PARA IMPRIMIR -->
<div class="recibo-print" id="recibo-print"></div>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver</a>
  <h1>Liquidaciones</h1>
  <span class="user-name" id="user-name"></span>
  <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('liquidaciones')">💰 Liquidaciones</button>
  <button class="tab" onclick="switchTab('comisiones')">⚙️ Config. Comisiones</button>
</div>

<!-- LIQUIDACIONES PANEL -->
<div class="tab-panel active" id="panel-liquidaciones">
  <div class="selector-bar">
    <label>Reunión:</label>
    <select id="sel-reunion" onchange="loadLiquidaciones()">
      <option value="">— Todas las reuniones —</option>
    </select>
    <select id="f-estado-f" onchange="loadLiquidaciones()" style="width:160px;">
      <option value="">Todos los estados</option>
      <option value="borrador">Borrador</option>
      <option value="aprobada">Aprobada</option>
      <option value="pagada">Pagada</option>
      <option value="anulada">Anulada</option>
    </select>
    <button class="btn-primary" onclick="generarLiquidaciones()">⚡ Generar liquidaciones</button>
  </div>
  <div class="content">
    <div id="liq-container">
      <div class="empty-state"><div class="icon">💰</div><h3>Seleccionar una reunión o generar liquidaciones automáticamente</h3></div>
    </div>
  </div>
</div>

<!-- COMISIONES PANEL -->
<div class="tab-panel" id="panel-comisiones">
  <div class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <h2 style="font-size:18px;color:var(--accent);">Configuración de Comisiones</h2>
      <button class="btn-primary" onclick="openComisionModal()">+ Nueva configuración</button>
    </div>
    <div id="comision-container"><div class="loading-state"><div class="spinner"></div> Cargando…</div></div>
  </div>
</div>

<!-- MODAL DETALLE LIQUIDACIÓN -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal" style="max-width:800px;">
    <div class="modal-header">
      <h2 id="det-title">Detalle de liquidación</h2>
      <button class="btn-close" onclick="closeModal('modal-detalle')">✕</button>
    </div>
    <div class="modal-body" id="det-body"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-detalle')">Cerrar</button>
      <button class="btn-outline" onclick="imprimirRecibo()">🖨️ Imprimir recibo</button>
    </div>
  </div>
</div>

<!-- MODAL COMISIÓN -->
<div class="modal-overlay" id="modal-comision">
  <div class="modal">
    <div class="modal-header">
      <h2 id="com-title">Nueva configuración</h2>
      <button class="btn-close" onclick="closeModal('modal-comision')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="cf-id">
      <div class="form-grid">
        <div class="form-group">
          <label>Tipo de profesional</label>
          <select id="cf-tipo-prof">
            <option value="jockey">Jockey</option>
            <option value="entrenador">Entrenador</option>
            <option value="ambos">Ambos</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo de cobro</label>
          <select id="cf-tipo-cobro">
            <option value="porcentaje_bolsa">% de bolsa</option>
            <option value="monto_fijo">Monto fijo</option>
            <option value="bono_actuacion">Bono por actuación</option>
            <option value="combinado">Combinado</option>
          </select>
        </div>
        <div class="form-group">
          <label>Porcentaje (%)</label>
          <input type="number" id="cf-pct" min="0" max="100" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Monto fijo ($)</label>
          <input type="number" id="cf-monto" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Posición bono</label>
          <input type="number" id="cf-pos-bono" min="1" max="10" placeholder="1">
        </div>
        <div class="form-group">
          <label>Monto bono ($)</label>
          <input type="number" id="cf-monto-bono" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Desc. fondo solidario (%)</label>
          <input type="number" id="cf-fondo" min="0" max="100" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Desc. incentivo (%)</label>
          <input type="number" id="cf-incentivo" min="0" max="100" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Vigente desde</label>
          <input type="date" id="cf-desde">
        </div>
        <div class="form-group">
          <label>Vigente hasta</label>
          <input type="date" id="cf-hasta">
        </div>
        <div class="form-group">
          <label>Activo</label>
          <select id="cf-activo">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('modal-comision')">Cancelar</button>
      <button class="btn-primary" onclick="saveComision()" id="btn-save-com">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb, CLUB_ID, currentUser;
async function initAuth(){const{createClient}=supabase;sb=createClient('https://unlhcuanfrtpatoipwve.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVubGhjdWFuZnJ0cGF0b2lwd3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MjQ0OTcsImV4cCI6MjA5MjMwMDQ5N30.rKb8BI7fBQcRdyyyxVfBOZbtCmGYKIMLUDLVmkn1SYM');const{data:{session}}=await sb.auth.getSession();if(!session){window.location.replace('login.html');return false;}const{data:usr}=await sb.from('usuarios').select('club_id,nombre_completo,rol').eq('email',session.user.email).single();if(usr.rol==='super_admin'){const urlClub=new URLSearchParams(window.location.search).get('club');CLUB_ID=urlClub||usr.club_id||null;}else{if(!usr.club_id){await sb.auth.signOut();window.location.replace('login.html');return false;}CLUB_ID=usr.club_id;}currentUser={...session.user,nombre_completo:usr.nombre_completo,rol:usr.rol};const uEl=document.getElementById('user-name');if(uEl)uEl.textContent=usr.nombre_completo||session.user.email;document.getElementById('auth-overlay').style.display='none';return true;}
function logout(){sb.auth.signOut().then(()=>window.location.replace('login.html'));}

let profesionales={}, liquidaciones=[], detalles={}, club=null;
let currentLiqId=null;

function toast(msg,type='success') {
  const t=document.createElement('div'); t.className=`toast toast-${type}`; t.textContent=msg;
  document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.remove(),3500);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function fmt(n) { return typeof n==='number' ? '$'+n.toLocaleString('es-AR',{minimumFractionDigits:2}) : '$0.00'; }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['liquidaciones','comisiones'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id===`panel-${name}`));
  if (name==='comisiones') loadComisiones();
}

async function init() {
  const [{ data: reuns }, { data: profs }, { data: clubData }] = await Promise.all([
    sb.from('reuniones').select('id,numero,fecha,hipodromos(nombre)').eq('club_id', CLUB_ID).order('fecha', {ascending:false}),
    sb.from('profesionales').select('id,nombre,apellido,tipo').eq('club_id', CLUB_ID).order('apellido'),
    sb.from('clubs').select('*').eq('id', CLUB_ID).single(),
  ]);
  (profs||[]).forEach(p=>{ profesionales[p.id]=p; });
  club = clubData;
  const sel = document.getElementById('sel-reunion');
  sel.innerHTML = '<option value="">— Todas —</option>' + (reuns||[]).map(r=>`<option value="${r.id}">Reunión ${r.numero||''} — ${new Date(r.fecha+'T12:00:00').toLocaleDateString('es-AR')} — ${r.hipodromos?.nombre||''}</option>`).join('');
  loadLiquidaciones();
}

async function loadLiquidaciones() {
  document.getElementById('liq-container').innerHTML = '<div class="loading-state"><div class="spinner"></div> Cargando…</div>';
  const rid = document.getElementById('sel-reunion').value;
  const estado = document.getElementById('f-estado-f').value;
  let q = sb.from('liquidaciones').select('*, liquidacion_detalle(*)').eq('club_id', CLUB_ID);
  if (rid) q = q.eq('reunion_id', rid);
  if (estado) q = q.eq('estado', estado);
  q = q.order('created_at', {ascending:false});
  const { data, error } = await q;
  if (error) { toast(error.message,'error'); return; }
  liquidaciones = data||[];
  renderLiquidaciones();
}

function renderLiquidaciones() {
  if (!liquidaciones.length) {
    document.getElementById('liq-container').innerHTML = '<div class="empty-state"><div class="icon">💰</div><h3>Sin liquidaciones</h3><p style="color:var(--muted);font-size:13px;margin-top:8px;">Generá liquidaciones automáticamente desde los resultados oficializados.</p></div>';
    return;
  }
  document.getElementById('liq-container').innerHTML = `<div class="liq-grid">${liquidaciones.map(l => {
    const prof = l.profesional_id ? profesionales[l.profesional_id] : null;
    const nombre = prof ? `${prof.apellido}, ${prof.nombre}` : (l.propietario_id ? 'Propietario' : '—');
    return `<div class="liq-card ${l.estado}">
      <div class="liq-header">
        <div>
          <div class="liq-prof">${nombre}</div>
          <div class="liq-recibo">${l.numero_recibo ? `Recibo N° ${l.numero_recibo}` : 'Sin N° recibo'}</div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div class="liq-montos">
            <div class="monto-item"><div class="monto-lbl">Bruto</div><div class="monto-val">${fmt(l.total_bruto)}</div></div>
            <div class="monto-item"><div class="monto-lbl">Desc.</div><div class="monto-val text-danger">-${fmt(l.total_descuentos)}</div></div>
            <div class="monto-item"><div class="monto-lbl">Neto</div><div class="monto-val neto">${fmt(l.total_neto)}</div></div>
          </div>
          <span class="badge badge-${l.estado}">${l.estado}</span>
        </div>
      </div>
      <div style="padding:0 18px 14px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-sm btn-det" onclick="verDetalle('${l.id}')">📋 Ver detalle</button>
        ${l.estado==='borrador'?`<button class="btn-sm btn-aprobar" onclick="cambiarEstado('${l.id}','aprobada')">✅ Aprobar</button>`:''}
        ${l.estado==='aprobada'?`<button class="btn-sm btn-pagar" onclick="cambiarEstado('${l.id}','pagada')">💳 Marcar pagada</button>`:''}
        <button class="btn-sm btn-impr" onclick="currentLiqId='${l.id}';imprimirRecibo()">🖨️ Recibo</button>
        ${l.estado!=='pagada'?`<button class="btn-sm btn-delete" onclick="eliminarLiq('${l.id}')">🗑️</button>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function cambiarEstado(id, estado) {
  const { error } = await sb.from('liquidaciones').update({ estado }).eq('id', id);
  if (error) { toast(error.message,'error'); return; }
  toast(`Estado actualizado: ${estado}`);
  loadLiquidaciones();
}

async function eliminarLiq(id) {
  if (!confirm('¿Eliminar esta liquidación?')) return;
  await sb.from('liquidacion_detalle').delete().eq('liquidacion_id', id);
  const { error } = await sb.from('liquidaciones').delete().eq('id', id);
  if (error) { toast(error.message,'error'); return; }
  toast('Liquidación eliminada');
  loadLiquidaciones();
}

function verDetalle(id) {
  currentLiqId = id;
  const liq = liquidaciones.find(l=>l.id===id);
  if (!liq) return;
  const prof = liq.profesional_id ? profesionales[liq.profesional_id] : null;
  const nombre = prof ? `${prof.apellido}, ${prof.nombre}` : '—';
  document.getElementById('det-title').textContent = `Liquidación — ${nombre}`;
  const dets = liq.liquidacion_detalle || [];
  const rows = dets.map(d=>`<tr>
    <td>${d.concepto||''}</td>
    <td>${d.descripcion||''}</td>
    <td class="text-right">${fmt(d.monto_bruto)}</td>
    <td class="text-right text-danger">${d.porcentaje_desc?d.porcentaje_desc+'%':''} ${fmt(d.monto_descuento)}</td>
    <td class="text-right text-accent">${fmt(d.monto_neto)}</td>
  </tr>`).join('');
  document.getElementById('det-body').innerHTML = `
    <table class="detalle-table">
      <thead><tr><th>Concepto</th><th>Descripción</th><th class="text-right">Bruto</th><th class="text-right">Descuento</th><th class="text-right">Neto</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--muted)">Sin detalles</td></tr>'}</tbody>
      <tfoot>
        <tr><td colspan="2">TOTALES</td><td class="text-right">${fmt(liq.total_bruto)}</td><td class="text-right text-danger">-${fmt(liq.total_descuentos)}</td><td class="text-right text-success">${fmt(liq.total_neto)}</td></tr>
      </tfoot>
    </table>`;
  document.getElementById('modal-detalle').classList.add('open');
}

function imprimirRecibo() {
  const id = currentLiqId;
  const liq = liquidaciones.find(l=>l.id===id);
  if (!liq) return;
  const prof = liq.profesional_id ? profesionales[liq.profesional_id] : null;
  const nombre = prof ? `${prof.apellido}, ${prof.nombre}` : '—';
  const dets = liq.liquidacion_detalle || [];
  const rows = dets.map(d=>`<tr><td>${d.concepto}</td><td>${d.descripcion||''}</td><td style="text-align:right">${fmt(d.monto_bruto)}</td><td style="text-align:right">${fmt(d.monto_descuento)}</td><td style="text-align:right">${fmt(d.monto_neto)}</td></tr>`).join('');
  document.getElementById('recibo-print').innerHTML = `<div class="recibo-container">
    <div class="recibo-header">
      <h2>${club?.nombre||'SGH'}</h2>
      <p>${club?.domicilio||''} — ${club?.localidad||''}, ${club?.provincia||''}</p>
      <p>CUIT: ${club?.cuit||''} | Tel: ${club?.telefono||''}</p>
      <h3 style="margin-top:10px;">RECIBO DE LIQUIDACIÓN</h3>
      ${liq.numero_recibo?`<p>N° ${liq.numero_recibo}</p>`:''}
    </div>
    <p><strong>Beneficiario:</strong> ${nombre}</p>
    <p><strong>Estado:</strong> ${liq.estado} | <strong>Fecha:</strong> ${new Date().toLocaleDateString('es-AR')}</p>
    <table class="recibo-table">
      <thead><tr><th>Concepto</th><th>Descripción</th><th>Bruto</th><th>Descuento</th><th>Neto</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="recibo-total">
      <p>Total bruto: ${fmt(liq.total_bruto)}</p>
      <p>Total descuentos: -${fmt(liq.total_descuentos)}</p>
      <p style="font-size:16px;">TOTAL NETO A PAGAR: ${fmt(liq.total_neto)}</p>
    </div>
    <p style="margin-top:40px;font-size:11px;text-align:center;">Firma y sello: _____________________</p>

async function generarLiquidaciones() {
  const rid = document.getElementById('sel-reunion').value;
  if (!rid) { toast('Seleccionar una reunión para generar liquidaciones','error'); return; }
  if (!confirm('¿Generar liquidaciones automáticas para esta reunión? Se crearán liquidaciones en borrador para cada profesional con resultados oficiales.')) return;

  // Get carreras of reunion with official results
  const { data: cars } = await sb.from('carreras').select('id,bolsa_total,distribucion_premios').eq('reunion_id', rid);
  const carIds = (cars||[]).map(c=>c.id);
  if (!carIds.length) { toast('La reunión no tiene carreras','error'); return; }

  // Get official results
  const { data: results } = await sb.from('resultados').select('id,carrera_id').in('carrera_id', carIds).eq('estado', 'oficial');
  const resIds = (results||[]).map(r=>r.id);
  if (!resIds.length) { toast('No hay resultados oficiales en esta reunión','error'); return; }

  // Get posiciones
  const { data: poss } = await sb.from('resultado_posiciones').select('*').in('resultado_id', resIds).not('posicion', 'is', null);
  // Get inscripciones
  const { data: inscs } = await sb.from('inscripciones').select('*').in('carrera_id', carIds);
  // Get comision config
  const { data: comCfg } = await sb.from('comision_config').select('*').eq('club_id', CLUB_ID).eq('activo', true);

  // Group by profesional
  const profMap = {}; // profId -> [{carrera, posicion, bolsa, distribucion}]
  for (const pos of (poss||[])) {
    const res = results.find(r=>r.id===pos.resultado_id);
    const insc = (inscs||[]).find(i=>i.id===pos.inscripcion_id);
    if (!res || !insc) continue;
    const car = cars.find(c=>c.id===res.carrera_id);
    if (!insc.jockey_titular_id && !insc.entrenador_id) continue;
    const addToProf = (profId, tipo) => {
      if (!profId) return;
      if (!profMap[profId]) profMap[profId] = { tipo, items: [] };
      profMap[profId].items.push({ carrera_id: car.id, posicion: pos.posicion, bolsa: car.bolsa_total||0, distribucion: car.distribucion_premios||{} });
    };
    addToProf(insc.jockey_titular_id, 'jockey');
    addToProf(insc.entrenador_id, 'entrenador');
  }

  let created = 0;
  for (const [profId, profData] of Object.entries(profMap)) {
    let totalBruto=0, totalDesc=0;
    const detalleRows = [];
    const cfg = (comCfg||[]).find(c=>c.tipo_profesional===profData.tipo||c.tipo_profesional==='ambos');
    for (const item of profData.items) {
      const pct = item.distribucion[String(item.posicion)];
      if (!pct || !item.bolsa) continue;
      const premio = item.bolsa * pct / 100;
      let bruto = 0;
      if (cfg) {
        if (cfg.tipo_cobro==='porcentaje_bolsa') bruto = premio * (cfg.porcentaje||0) / 100;
        else if (cfg.tipo_cobro==='monto_fijo') bruto = cfg.monto_fijo||0;
        else bruto = premio * (cfg.porcentaje||0) / 100 + (cfg.monto_fijo||0);
        if (cfg.posicion_bono && item.posicion<=cfg.posicion_bono) bruto += cfg.monto_bono||0;
      } else {
        bruto = premio * 0.08; // default 8%
      }
      const descPct = ((cfg?.descuento_fondo_solidario_pct||0) + (cfg?.descuento_incentivo_pct||0));
      const desc = bruto * descPct / 100;
      const neto = bruto - desc;
      totalBruto += bruto; totalDesc += desc;
      detalleRows.push({ concepto: `${item.posicion}° puesto`, descripcion: `Carrera — Premio: ${fmt(premio)}`, monto_bruto: bruto, porcentaje_desc: descPct, monto_descuento: desc, monto_neto: neto, orden_display: detalleRows.length+1 });
    }
    if (!detalleRows.length) continue;
    const { data: liqData, error } = await sb.from('liquidaciones').insert({ club_id: CLUB_ID, reunion_id: rid, profesional_id: profId, total_bruto: totalBruto, total_descuentos: totalDesc, total_neto: totalBruto-totalDesc, estado: 'borrador' }).select().single();
    if (error) continue;
    const dRows = detalleRows.map(d=>({...d, liquidacion_id: liqData.id}));
    await sb.from('liquidacion_detalle').insert(dRows);
    created++;
  }
  toast(`${created} liquidación(es) generada(s) en borrador`);
  loadLiquidaciones();
}

// COMISIONES
async function loadComisiones() {
  document.getElementById('comision-container').innerHTML='<div class="loading-state"><div class="spinner"></div></div>';
  const { data, error } = await sb.from('comision_config').select('*').eq('club_id', CLUB_ID).order('tipo_profesional');
  if (error) { toast(error.message,'error'); return; }
  if (!data?.length) {
    document.getElementById('comision-container').innerHTML='<div class="empty-state"><div class="icon">⚙️</div><h3>Sin configuraciones. Creá la primera.</h3></div>';
    return;
  }
  document.getElementById('comision-container').innerHTML = `<div class="config-grid">${data.map(c=>`<div class="config-card">
    <div class="config-card-title">${c.tipo_profesional?.toUpperCase()} — ${c.tipo_cobro?.replace('_',' ')}</div>
    ${c.porcentaje?`<div class="config-row">Porcentaje <span>${c.porcentaje}%</span></div>`:''}
    ${c.monto_fijo?`<div class="config-row">Monto fijo <span>${fmt(c.monto_fijo)}</span></div>`:''}
    ${c.posicion_bono?`<div class="config-row">Bono posición ${c.posicion_bono}° <span>${fmt(c.monto_bono)}</span></div>`:''}
    ${c.descuento_fondo_solidario_pct?`<div class="config-row">Fondo solidario <span>-${c.descuento_fondo_solidario_pct}%</span></div>`:''}
    ${c.descuento_incentivo_pct?`<div class="config-row">Incentivo <span>-${c.descuento_incentivo_pct}%</span></div>`:''}
    <div class="config-row">Estado <span>${c.activo?'✅ Activo':'❌ Inactivo'}</span></div>
    <div style="display:flex;gap:6px;margin-top:10px;">
      <button class="btn-sm btn-aprobar" onclick='openComisionModal(${JSON.stringify(c)})'>✏️ Editar</button>
      <button class="btn-sm btn-delete" onclick="deleteComision('${c.id}')">🗑️</button>
    </div>
  </div>`).join('')}</div>`;
}

function openComisionModal(rec=null) {
  document.getElementById('com-title').textContent = rec ? 'Editar configuración' : 'Nueva configuración';
  document.getElementById('cf-id').value = rec?.id||'';
  document.getElementById('cf-tipo-prof').value = rec?.tipo_profesional||'jockey';
  document.getElementById('cf-tipo-cobro').value = rec?.tipo_cobro||'porcentaje_bolsa';
  document.getElementById('cf-pct').value = rec?.porcentaje||'';
  document.getElementById('cf-monto').value = rec?.monto_fijo||'';
  document.getElementById('cf-pos-bono').value = rec?.posicion_bono||'';
  document.getElementById('cf-monto-bono').value = rec?.monto_bono||'';
  document.getElementById('cf-fondo').value = rec?.descuento_fondo_solidario_pct||'';
  document.getElementById('cf-incentivo').value = rec?.descuento_incentivo_pct||'';
  document.getElementById('cf-desde').value = rec?.vigente_desde||'';
  document.getElementById('cf-hasta').value = rec?.vigente_hasta||'';
  document.getElementById('cf-activo').value = rec ? String(rec.activo) : 'true';
  document.getElementById('modal-comision').classList.add('open');
}

async function saveComision() {
  const id = document.getElementById('cf-id').value;
  const btn = document.getElementById('btn-save-com');
  btn.disabled=true; btn.textContent='Guardando…';
  const payload = {
    club_id: CLUB_ID,
    tipo_profesional: document.getElementById('cf-tipo-prof').value,
    tipo_cobro: document.getElementById('cf-tipo-cobro').value,
    porcentaje: document.getElementById('cf-pct').value ? parseFloat(document.getElementById('cf-pct').value) : null,
    monto_fijo: document.getElementById('cf-monto').value ? parseFloat(document.getElementById('cf-monto').value) : null,
    posicion_bono: document.getElementById('cf-pos-bono').value ? parseInt(document.getElementById('cf-pos-bono').value) : null,
    monto_bono: document.getElementById('cf-monto-bono').value ? parseFloat(document.getElementById('cf-monto-bono').value) : null,
    descuento_fondo_solidario_pct: document.getElementById('cf-fondo').value ? parseFloat(document.getElementById('cf-fondo').value) : null,
    descuento_incentivo_pct: document.getElementById('cf-incentivo').value ? parseFloat(document.getElementById('cf-incentivo').value) : null,
    vigente_desde: document.getElementById('cf-desde').value || null,
    vigente_hasta: document.getElementById('cf-hasta').value || null,
    activo: document.getElementById('cf-activo').value==='true',
  };
  const { error } = id
    ? await sb.from('comision_config').update(payload).eq('id',id)
    : await sb.from('comision_config').insert(payload);
  btn.disabled=false; btn.textContent='Guardar';
  if (error) { toast(error.message,'error'); return; }
  toast('Configuración guardada');
  closeModal('modal-comision');
  loadComisiones();
}

async function deleteComision(id) {
  if (!confirm('¿Eliminar esta configuración?')) return;
  const { error } = await sb.from('comision_config').delete().eq('id',id);
  if (error) { toast(error.message,'error'); return; }
  toast('Configuración eliminada');
  loadComisiones();
}

document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===e.currentTarget)m.classList.remove('open');}));
(async()=>{if(await initAuth())init();})();
