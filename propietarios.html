<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propietarios — SGH</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e2318; --card: #1a3d26; --accent: #c9a84c;
      --text: #f5f0e8; --muted: #a0b8a0; --danger: #e05252;
      --success: #4caf82; --border: rgba(201,168,76,0.2); --input-bg: #0e2318;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }

    /* TOPBAR */
    .topbar { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .btn-back { background: none; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .topbar h1 { font-size: 22px; color: var(--accent); flex: 1; }

    /* CONTENT */
    .content { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* TOOLBAR */
    .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 240px; position: relative; }
    .search-box input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px 10px 40px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; }
    .filter-select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; outline: none; }
    .btn-primary { background: var(--accent); color: #1a1a0a; border: none; padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.9; }

    /* STATS */
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; text-align: center; min-width: 120px; }
    .stat-chip-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-chip-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: border-color 0.2s; }
    .card:hover { border-color: rgba(201,168,76,0.4); }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--accent); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-doc { font-size: 13px; color: var(--muted); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-persona { background: rgba(76,175,130,0.15); color: var(--success); border: 1px solid rgba(76,175,130,0.3); }
    .badge-sociedad { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .badge-inactivo { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .card-detail { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 12px; }
    .card-detail span { color: var(--text); }
    .card-colors { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
    .card-actions { display: flex; gap: 8px; }
    .btn-sm { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border: none; transition: all 0.2s; }
    .btn-edit { background: rgba(201,168,76,0.15); color: var(--accent); border: 1px solid rgba(201,168,76,0.3); }
    .btn-edit:hover { background: rgba(201,168,76,0.25); }
    .btn-delete { background: rgba(224,82,82,0.1); color: var(--danger); border: 1px solid rgba(224,82,82,0.3); }
    .btn-delete:hover { background: rgba(224,82,82,0.2); }

    /* EMPTY / LOADING */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: var(--muted); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--muted); opacity: 0.7; }
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 20px; color: var(--accent); }
    .btn-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px; }
    .btn-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    input, select, textarea {
      background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      padding: 10px 14px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; width: 100%; transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #1a3d26; }
    .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 10px 20px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* TOAST */
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; max-width: 320px; animation: slideIn 0.3s ease; }
    .toast-success { background: #1a4a30; border: 1px solid var(--success); color: var(--text); }
    .toast-error { background: #4a1a1a; border: 1px solid var(--danger); color: var(--text); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="topbar">
  <a href="index.html" class="btn-back">← Volver</a>
  <h1>Propietarios</h1>
</div>

<div class="content">
  <div class="stats-row">
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-total">—</div><div class="stat-chip-lbl">Total</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-persona">—</div><div class="stat-chip-lbl">Personas</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-sociedad">—</div><div class="stat-chip-lbl">Sociedades</div></div>
    <div class="stat-chip"><div class="stat-chip-val" id="cnt-activos">—</div><div class="stat-chip-lbl">Activos</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="search" placeholder="Buscar por nombre o documento…" oninput="filterRender()">
    </div>
    <select class="filter-select" id="filter-tipo" onchange="filterRender()">
      <option value="">Todos los tipos</option>
      <option value="persona">Persona</option>
      <option value="sociedad">Sociedad</option>
    </select>
    <select class="filter-select" id="filter-activo" onchange="filterRender()">
      <option value="">Todos</option>
      <option value="true">Activos</option>
      <option value="false">Inactivos</option>
    </select>
    <button class="btn-primary" onclick="openModal()">+ Nuevo Propietario</button>
  </div>

  <div id="list-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nuevo Propietario</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="form" onsubmit="saveRecord(event)">
        <input type="hidden" id="f-id">
        <div class="form-grid">
          <div class="form-group">
            <label>Tipo *</label>
            <select id="f-tipo" required>
              <option value="persona">Persona física</option>
              <option value="sociedad">Sociedad / Stud</option>
            </select>
          </div>
          <div class="form-group">
            <label>Activo</label>
            <select id="f-activo">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Nombre completo / Razón social *</label>
            <input type="text" id="f-nombre" required placeholder="Apellido y nombre o razón social">
          </div>
          <div class="form-group">
            <label>Tipo documento</label>
            <select id="f-doc-tipo">
              <option value="DNI">DNI</option>
              <option value="CUIT">CUIT</option>
              <option value="CUIL">CUIL</option>
              <option value="Pasaporte">Pasaporte</option>
              <option value="Otro">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>N° documento</label>
            <input type="text" id="f-doc-nro" placeholder="XX-XXXXXXXX-X">
          </div>
          <div class="form-group full">
            <label>Domicilio</label>
            <input type="text" id="f-domicilio" placeholder="Calle, número, depto">
          </div>
          <div class="form-group">
            <label>Localidad</label>
            <input type="text" id="f-localidad">
          </div>
          <div class="form-group">
            <label>Provincia</label>
            <input type="text" id="f-provincia">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="f-telefono">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="f-email">
          </div>
          <div class="form-group full">
            <label>Colores registrados</label>
            <input type="text" id="f-colores" placeholder="Ej: Rojo y blanco, mangas azules">
          </div>
          <div class="form-group full">
            <label>Notas</label>
            <textarea id="f-notas" placeholder="Observaciones adicionales…"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="document.getElementById('form').requestSubmit()" id="btn-save">Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient('https://unlhcuanfrtpatoipwve.supabase.co', 'sb_publishable_gypetSX16kGMXHhG_xqLWA_7wrzWgAK');
const CLUB_ID = 'a6da7e40-1515-45dc-8933-4eef33ce937a';

let allData = [];

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function setList(html) { document.getElementById('list-container').innerHTML = html; }

async function load() {
  setList('<div class="loading-state"><div class="spinner"></div> Cargando propietarios…</div>');
  const { data, error } = await sb.from('propietarios').select('*').eq('club_id', CLUB_ID).order('nombre');
  if (error) { toast(error.message, 'error'); setList(''); return; }
  allData = data || [];
  updateStats();
  filterRender();
}

function updateStats() {
  document.getElementById('cnt-total').textContent = allData.length;
  document.getElementById('cnt-persona').textContent = allData.filter(r => r.tipo === 'persona').length;
  document.getElementById('cnt-sociedad').textContent = allData.filter(r => r.tipo === 'sociedad').length;
  document.getElementById('cnt-activos').textContent = allData.filter(r => r.activo).length;
}

function filterRender() {
  const q = document.getElementById('search').value.toLowerCase();
  const tipo = document.getElementById('filter-tipo').value;
  const activo = document.getElementById('filter-activo').value;
  let data = allData.filter(r => {
    const matchQ = !q || r.nombre?.toLowerCase().includes(q) || r.documento_nro?.toLowerCase().includes(q);
    const matchTipo = !tipo || r.tipo === tipo;
    const matchActivo = activo === '' || String(r.activo) === activo;
    return matchQ && matchTipo && matchActivo;
  });
  renderList(data);
}

function renderList(data) {
  if (!data.length) {
    setList(`<div class="empty-state"><div class="icon">👤</div><h3>Sin resultados</h3><p>No se encontraron propietarios con los filtros seleccionados.</p></div>`);
    return;
  }
  setList(`<div class="grid">${data.map(r => cardHTML(r)).join('')}</div>`);
}

function cardHTML(r) {
  const tipoBadge = r.tipo === 'persona'
    ? `<span class="badge badge-persona">Persona</span>`
    : `<span class="badge badge-sociedad">Sociedad</span>`;
  const activoBadge = !r.activo ? `<span class="badge badge-inactivo">Inactivo</span>` : '';
  const doc = r.documento_nro ? `${r.documento_tipo || ''} ${r.documento_nro}` : '—';
  const loc = [r.localidad, r.provincia].filter(Boolean).join(', ') || '—';
  return `<div class="card">
    <div class="card-header">
      <div class="card-info">
        <div class="card-name" title="${r.nombre}">${r.nombre}</div>
        <div class="card-doc">${doc}</div>
      </div>
      <div style="display:flex;gap:4px;flex-direction:column;align-items:flex-end;">${tipoBadge}${activoBadge}</div>
    </div>
    <div class="card-detail">
      ${r.domicilio ? `<div>📍 <span>${r.domicilio}</span></div>` : ''}
      <div>🏘️ <span>${loc}</span></div>
      ${r.telefono ? `<div>📞 <span>${r.telefono}</span></div>` : ''}
      ${r.email ? `<div>✉️ <span>${r.email}</span></div>` : ''}
    </div>
    ${r.colores_desc ? `<div class="card-colors">🎨 ${r.colores_desc}</div>` : ''}
    <div class="card-actions">
      <button class="btn-sm btn-edit" onclick="openModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">✏️ Editar</button>
      <button class="btn-sm btn-delete" onclick="deleteRecord('${r.id}','${r.nombre.replace(/'/g,"\\'")}')">🗑️ Eliminar</button>
    </div>
  </div>`;
}

function openModal(rec = null) {
  document.getElementById('modal-title').textContent = rec ? 'Editar Propietario' : 'Nuevo Propietario';
  document.getElementById('f-id').value = rec?.id || '';
  document.getElementById('f-tipo').value = rec?.tipo || 'persona';
  document.getElementById('f-activo').value = rec ? String(rec.activo) : 'true';
  document.getElementById('f-nombre').value = rec?.nombre || '';
  document.getElementById('f-doc-tipo').value = rec?.documento_tipo || 'DNI';
  document.getElementById('f-doc-nro').value = rec?.documento_nro || '';
  document.getElementById('f-domicilio').value = rec?.domicilio || '';
  document.getElementById('f-localidad').value = rec?.localidad || '';
  document.getElementById('f-provincia').value = rec?.provincia || '';
  document.getElementById('f-telefono').value = rec?.telefono || '';
  document.getElementById('f-email').value = rec?.email || '';
  document.getElementById('f-colores').value = rec?.colores_desc || '';
  document.getElementById('f-notas').value = rec?.notas || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('form').reset();
}

async function saveRecord(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Guardando…';
  const id = document.getElementById('f-id').value;
  const payload = {
    club_id: CLUB_ID,
    tipo: document.getElementById('f-tipo').value,
    activo: document.getElementById('f-activo').value === 'true',
    nombre: document.getElementById('f-nombre').value.trim(),
    documento_tipo: document.getElementById('f-doc-tipo').value,
    documento_nro: document.getElementById('f-doc-nro').value.trim() || null,
    domicilio: document.getElementById('f-domicilio').value.trim() || null,
    localidad: document.getElementById('f-localidad').value.trim() || null,
    provincia: document.getElementById('f-provincia').value.trim() || null,
    telefono: document.getElementById('f-telefono').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    colores_desc: document.getElementById('f-colores').value.trim() || null,
    notas: document.getElementById('f-notas').value.trim() || null,
  };
  const { error } = id
    ? await sb.from('propietarios').update(payload).eq('id', id)
    : await sb.from('propietarios').insert(payload);
  btn.disabled = false; btn.textContent = 'Guardar';
  if (error) { toast(error.message, 'error'); return; }
  toast(id ? 'Propietario actualizado' : 'Propietario creado');
  closeModal();
  load();
}

async function deleteRecord(id, nombre) {
  if (!confirm(`¿Eliminar a "${nombre}"? Esta acción no se puede deshacer.`)) return;
  const { error } = await sb.from('propietarios').delete().eq('id', id);
  if (error) { toast(error.message, 'error'); return; }
  toast('Propietario eliminado');
  load();
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
load();
</script>
</body>
</html>
